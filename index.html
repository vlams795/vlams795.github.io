<script>
  const USER   = 'vlams795';   // ← ganti
  const REPO   = 'vlams795.github.io';         // ← ganti
  const BRANCH = 'main';
  const FILE   = 'data/sensor_data.json';

  // Gunakan raw.githubusercontent.com dengan cache-bust agresif
  function buildURL() {
    return `https://raw.githubusercontent.com/${USER}/${REPO}/${BRANCH}/${FILE}`
           + `?bust=${Date.now()}_${Math.random().toString(36).slice(2)}`;
  }

  let chart, lastSig = null;
  const QMAP = { MURNI:0, BAIK:1, SEDANG:2, LAYAK:3, BURUK:4 };

  // ── Chart ────────────────────────────────────────────────────
  function initChart() {
    chart = new Chart(document.getElementById('chart').getContext('2d'), {
      type: 'line',
      data: {
        labels: [],
        datasets: [{
          label: 'TDS (ppm)',
          data: [],
          borderColor: '#38bdf8',
          backgroundColor: 'rgba(56,189,248,0.1)',
          tension: 0.4, fill: true, pointRadius: 5,
          pointBackgroundColor: '#38bdf8'
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { labels: { color:'#8b949e', font:{size:11} } } },
        scales: {
          x: { ticks:{color:'#6e7681',font:{size:10}}, grid:{color:'#21262d'} },
          y: { min:0,
               ticks:{color:'#6e7681',font:{size:10},callback:v=>v+' ppm'},
               grid:{color:'#21262d'} }
        }
      }
    });
  }

  // ── Helper ───────────────────────────────────────────────────
  function rssiQ(r) {
    if (r >= -50) return 'Sangat Baik';
    if (r >= -60) return 'Baik';
    if (r >= -70) return 'Cukup';
    return 'Lemah';
  }
  function formatUptime(ms) {
    const s = Math.floor(ms/1000), m = Math.floor(s/60), h = Math.floor(m/60);
    return `${h}j ${m%60}m ${s%60}d`;
  }
  function setLoading(on) {
    document.getElementById('btn-refresh').classList.toggle('loading', on);
    document.getElementById('btn-icon').classList.toggle('spin', on);
  }
  function setQualityScale(label) {
    for (let i = 0; i < 5; i++)
      document.getElementById('sq-' + i).classList.remove('active');
    const idx = QMAP[label];
    if (idx !== undefined)
      document.getElementById('sq-' + idx).classList.add('active');
  }

  // ── Fetch utama ──────────────────────────────────────────────
  async function fetchData() {
    setLoading(true);
    document.getElementById('notif').style.display = 'none';

    try {
      const res = await fetch(buildURL(), {
        method: 'GET',
        cache: 'no-store',      // paksa browser tidak gunakan cache
        headers: {
          'Cache-Control': 'no-cache, no-store, must-revalidate',
          'Pragma':        'no-cache',
          'Expires':       '0'
        }
      });

      if (!res.ok) throw new Error('HTTP ' + res.status);

      const data = await res.json();

      // Deteksi perubahan
      const sig     = `${data.tds_ppm}-${data.uptime_ms}`;
      const changed = lastSig !== null && lastSig !== sig;
      lastSig       = sig;

      // Kartu utama
      document.getElementById('val-tds').textContent  = Number(data.tds_ppm).toFixed(1);
      document.getElementById('val-v').textContent    = Number(data.tds_voltage).toFixed(3);
      document.getElementById('val-rssi').textContent = data.wifi_rssi ?? '—';

      const qEl = document.getElementById('val-q');
      qEl.textContent = data.water_quality || '—';
      qEl.className   = 'val c-q q-' + (data.water_quality || '');

      setQualityScale(data.water_quality);

      // Info perangkat
      document.getElementById('d-id').textContent   = (data.device_id  || '—').slice(-8);
      document.getElementById('d-fw').textContent   = data.firmware    || '—';
      document.getElementById('d-ip').textContent   = data.ip_address  || '—';
      document.getElementById('d-up').textContent   = formatUptime(data.uptime_ms || 0);

      // Info jaringan
      document.getElementById('n-ssid').textContent = data.wifi_ssid  || '—';
      document.getElementById('n-rssi').textContent = (data.wifi_rssi || '—') + ' dBm';
      document.getElementById('n-qual').textContent = rssiQ(data.wifi_rssi);

      // Chart
      if (data.history && data.history.length > 0) {
        const n = data.history.length;
        chart.data.labels           = data.history.map((_, i) => 'T-' + (n - 1 - i));
        chart.data.datasets[0].data = data.history.map(d => d.tds);
        chart.update();
      }

      // Status
      document.getElementById('badge').textContent = 'Online';
      document.getElementById('badge').className   = 'badge online';
      document.getElementById('last-update').textContent =
        'Data dimuat: ' + new Date().toLocaleString('id-ID') +
        (changed ? ' · ✅ Data baru' : ' · Tidak ada perubahan');

    } catch (e) {
      document.getElementById('badge').textContent = 'Offline';
      document.getElementById('badge').className   = 'badge offline';
      document.getElementById('last-update').textContent =
        '⚠ Gagal memuat data: ' + e.message;
      console.error('fetchData error:', e);
    } finally {
      setLoading(false);
    }
  }

  // ── Silent check ─────────────────────────────────────────────
  async function silentCheck() {
    try {
      const res = await fetch(buildURL(), {
        cache: 'no-store',
        headers: { 'Cache-Control': 'no-cache' }
      });
      if (!res.ok) return;
      const data = await res.json();
      const sig  = `${data.tds_ppm}-${data.uptime_ms}`;
      if (lastSig !== null && lastSig !== sig)
        document.getElementById('notif').style.display = 'block';
    } catch (_) {}
  }

  // ── Init ─────────────────────────────────────────────────────
  initChart();
  fetchData();
  setInterval(silentCheck, 90000);
</script>
